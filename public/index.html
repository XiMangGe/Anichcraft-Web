<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暗影澄昏 - Minecraft服务器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&family=Long+Cang&family=Liu+Jian+Mao+Cao&family=ZCOOL+QingKe+HuangYou&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 杂乱彩色流动渐变背景 -->
  <div class="animated-bg">
    <div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div>
    <div class="blob"></div><div class="blob"></div><div class="blob"></div><div class="blob"></div>
  </div>

  <!-- 顶部导航栏 -->
  <nav class="topbar">
    <button class="hamburger" id="hamburger" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-title" id="topbarTitle">暗影澄昏</div>
    <div class="topbar-right">
      <button class="btn-login hidden" id="loginBtn" onclick="location.hash='#/login'">登录</button>
      <div class="user-badge hidden" id="userBadge" onclick="location.hash='#/profile'">
        <img class="user-badge-avatar" id="userBadgeAvatar" src="" alt="">
        <span id="userBadgeName"></span>
      </div>
    </div>
  </nav>

  <!-- 侧边菜单 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">暗影澄昏</span>
    </div>
    <nav class="menu" id="menu">
      <a href="#/home" class="menu-item" data-page="home"><span class="menu-icon">🏠</span> 首页</a>
      <a href="#/guide" class="menu-item" data-page="guide"><span class="menu-icon">📖</span> 进服指南</a>
      <a href="#/rules" class="menu-item" data-page="rules"><span class="menu-icon">📜</span> 服规</a>
      <a href="#/eula" class="menu-item" data-page="eula"><span class="menu-icon">📋</span> EULA</a>
      <a href="#/status" class="menu-item" data-page="status"><span class="menu-icon">📊</span> 服务器状态</a>
      <a href="#/map" class="menu-item" data-page="map"><span class="menu-icon">🗺️</span> 地图</a>
      <a href="#/chat" class="menu-item" data-page="chat"><span class="menu-icon">💬</span> 聊天</a>
      <a href="#/profile" class="menu-item" data-page="profile"><span class="menu-icon">👤</span> 个人空间</a>
      <a href="#/settings" class="menu-item" data-page="settings"><span class="menu-icon">⚙️</span> 设置</a>
    </nav>
    <div class="sidebar-footer">
      <p>© 2026 暗影澄昏服务器</p>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main id="app"></main>

  <!-- 全局通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 加载遮罩 -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
